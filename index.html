<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./cargador-archivos/style-cargador.css">
</head>
<body>

    <div id="containerBox" class="uploader">
        <input type="file" multiple>
        <label>
            <div class="start">
                <i class="fa fa-download"></i>
                <div>Selecciona un archivo o arrastra dentro de la caja</div>
                <span class="btn btn-primary">Selecciona un archivo</span>
            </div>
            <div class="container-files"></div>
        </label>
    </div>

    <div class="groups-btns">
        <button id="show_files">Obtener archivos</button>
        <button id="clean_files">Limpiar formulario</button>
    </div>
    
    <script src="./cargador-archivos/script-cargador.js"></script>
    <script src="./main.js"></script>
</body>
</html>
